model:
  n_layers: 4
  n_heads: 4
  d_model: 128
  context_length: 256
  dropout: 0.1

training:
  batch_size: 32
  learning_rate: 3e-4
  max_steps: 5000
  warmup_steps: 100
  grad_clip: 1.0
  weight_decay: 0.1
  min_lr_ratio: 0.1
  eval_interval: 100
  eval_batches: 20
  checkpoint_interval: 500
  mlflow_log_interval: 100

data:
  dataset: tinyshakespeare
  train_split: 0.9

mlflow:
  tracking_uri: results/mlruns
  experiment_name: nanogpt-lab
